<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generators 2026 — Comparative Infographic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   CSS CUSTOM PROPERTIES
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg-deep: #06060e;
  --bg-surface: #0c0c1a;
  --bg-card: rgba(14, 14, 32, 0.65);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.07);
  --text-primary: #e8e6f0;
  --text-secondary: #8b89a0;
  --text-muted: #5a587a;
  --accent-cyan: #00e5ff;
  --accent-magenta: #ff2daa;
  --accent-violet: #9d4edd;
  --accent-lime: #a3ff12;
  --accent-orange: #ff6d00;
  --accent-gold: #ffd600;
  --gradient-hero: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 30%, #0a1a2e 60%, #0a0a1a 100%);
  --gradient-accent: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet), var(--accent-magenta));
  --gradient-bar: linear-gradient(90deg, var(--accent-cyan), var(--accent-violet));
  --radius: 12px;
  --radius-lg: 20px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════
   NOISE OVERLAY
   ═══════════════════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

/* ═══════════════════════════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--accent-violet); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════════════════ */
.container { max-width: 1320px; margin: 0 auto; padding: 0 24px; }

.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent-cyan);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--accent-cyan);
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(36px, 5vw, 64px);
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 16px;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.section-subtitle {
  font-size: 16px;
  color: var(--text-secondary);
  font-weight: 300;
  max-width: 600px;
}

.section-header {
  margin-bottom: 48px;
}

/* Reveal animation */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
.reveal-delay-5 { transition-delay: 0.5s; }

/* ═══════════════════════════════════════════════════════════
   LANGUAGE TOGGLE
   ═══════════════════════════════════════════════════════════ */
.lang-toggle {
  position: fixed;
  top: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  background: rgba(10,10,26,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 40px;
  overflow: hidden;
}
.lang-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  padding: 10px 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
}
.lang-btn.active {
  background: var(--gradient-accent);
  color: #fff;
}
.lang-btn:hover:not(.active) {
  color: var(--text-primary);
}

/* ═══════════════════════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  background: var(--gradient-hero);
}

.hero-grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent);
}

.hero-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  animation: orbFloat 12s ease-in-out infinite;
}
.hero-orb-1 {
  width: 500px; height: 500px;
  background: rgba(157,78,221,0.15);
  top: -100px; right: -100px;
  animation-delay: 0s;
}
.hero-orb-2 {
  width: 400px; height: 400px;
  background: rgba(0,229,255,0.1);
  bottom: -50px; left: -50px;
  animation-delay: -4s;
}
.hero-orb-3 {
  width: 300px; height: 300px;
  background: rgba(255,45,170,0.08);
  top: 40%; left: 50%;
  animation-delay: -8s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -40px) scale(1.05); }
  66% { transform: translate(-20px, 30px) scale(0.95); }
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 80px 0;
}

.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent-cyan);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hero-eyebrow::before {
  content: '';
  display: inline-block;
  width: 40px;
  height: 2px;
  background: var(--accent-cyan);
}

.hero-title {
  font-family: var(--font-display);
  font-size: clamp(56px, 9vw, 130px);
  line-height: 0.92;
  letter-spacing: 3px;
  margin-bottom: 24px;
}
.hero-title .line-1 {
  display: block;
  color: var(--text-primary);
}
.hero-title .line-2 {
  display: block;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-title .line-3 {
  display: block;
  color: var(--text-primary);
  opacity: 0.4;
  font-size: 0.55em;
}

.hero-desc {
  font-size: 18px;
  font-weight: 300;
  color: var(--text-secondary);
  max-width: 520px;
  margin-bottom: 40px;
  line-height: 1.7;
}

.hero-stats {
  display: flex;
  gap: 48px;
  flex-wrap: wrap;
}
.hero-stat {
  position: relative;
  padding-left: 16px;
}
.hero-stat::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  width: 3px;
  height: 32px;
  background: var(--gradient-accent);
  border-radius: 2px;
}
.hero-stat-value {
  font-family: var(--font-display);
  font-size: 36px;
  color: var(--text-primary);
  line-height: 1;
}
.hero-stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 4px;
}

.hero-scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: scrollBounce 2s ease-in-out infinite;
}
.hero-scroll-hint .arrow {
  width: 16px;
  height: 16px;
  border-right: 1.5px solid var(--text-muted);
  border-bottom: 1.5px solid var(--text-muted);
  transform: rotate(45deg);
}
@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ═══════════════════════════════════════════════════════════
   MAIN TABLE SECTION
   ═══════════════════════════════════════════════════════════ */
.table-section {
  padding: 120px 0;
  position: relative;
}

.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--glass-border);
  background: var(--bg-card);
  backdrop-filter: blur(12px);
}

.data-table {
  width: 100%;
  min-width: 900px;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table thead {
  position: sticky;
  top: 0;
  z-index: 5;
}
.data-table th {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-cyan);
  padding: 18px 16px;
  text-align: left;
  background: rgba(0,229,255,0.04);
  border-bottom: 1px solid var(--glass-border);
  white-space: nowrap;
}
.data-table td {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.025);
  transition: background 0.2s;
  vertical-align: middle;
}
.data-table tr:hover td {
  background: rgba(255,255,255,0.02);
}

.model-name {
  font-weight: 600;
  font-size: 15px;
  color: var(--text-primary);
}
.model-provider {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.score-badge {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  padding: 4px 10px;
  border-radius: 6px;
  display: inline-block;
}
.score-tier-1 { background: rgba(0,229,255,0.12); color: var(--accent-cyan); }
.score-tier-2 { background: rgba(157,78,221,0.12); color: var(--accent-violet); }
.score-tier-3 { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

.price-cell {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-primary);
}

.speed-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.speed-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--gradient-bar);
  transition: width 1s var(--ease-out-expo);
}
.speed-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

.text-quality-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.text-quality-bar-bg {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
  min-width: 60px;
}
.text-quality-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.2s var(--ease-out-expo);
}
.tq-excellent { background: var(--accent-cyan); }
.tq-good { background: var(--accent-violet); }
.tq-fair { background: var(--accent-orange); }
.tq-low { background: var(--accent-magenta); }

.text-quality-pct {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  min-width: 36px;
}

.best-for-tag {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  display: inline-block;
  color: var(--text-secondary);
  white-space: nowrap;
}

.rank-num {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text-muted);
  width: 32px;
  text-align: center;
}
.rank-num.top-3 { color: var(--accent-gold); }

/* ═══════════════════════════════════════════════════════════
   CHARTS SECTION
   ═══════════════════════════════════════════════════════════ */
.charts-section {
  padding: 80px 0 120px;
}

.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.chart-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 32px;
  position: relative;
  overflow: hidden;
}
.chart-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--gradient-accent);
}

.chart-card-title {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--text-primary);
  margin-bottom: 24px;
}

/* Bar chart custom */
.bar-chart { display: flex; flex-direction: column; gap: 14px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  min-width: 110px;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-track {
  flex: 1;
  height: 22px;
  background: rgba(255,255,255,0.03);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1.5s var(--ease-out-expo);
  position: relative;
}
.bar-fill::after {
  content: attr(data-value);
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

.bar-gradient-1 { background: linear-gradient(90deg, #00e5ff, #00b8d4); }
.bar-gradient-2 { background: linear-gradient(90deg, #9d4edd, #7b2cbf); }
.bar-gradient-3 { background: linear-gradient(90deg, #ff2daa, #c9184a); }
.bar-gradient-4 { background: linear-gradient(90deg, #a3ff12, #76c000); }
.bar-gradient-5 { background: linear-gradient(90deg, #ffd600, #ff9e00); }

/* Radar chart canvas */
.radar-canvas-wrap {
  display: flex;
  justify-content: center;
  padding: 16px 0;
}
.radar-canvas-wrap canvas {
  max-width: 100%;
}

/* ═══════════════════════════════════════════════════════════
   WINNERS SECTION
   ═══════════════════════════════════════════════════════════ */
.winners-section {
  padding: 80px 0 120px;
}

.winners-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.winner-card {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 28px;
  position: relative;
  overflow: hidden;
  transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s ease;
}
.winner-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.winner-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}
.winner-card.cat-overall::before { background: var(--accent-cyan); }
.winner-card.cat-social::before { background: var(--accent-magenta); }
.winner-card.cat-free::before { background: var(--accent-lime); }
.winner-card.cat-text::before { background: var(--accent-gold); }
.winner-card.cat-art::before { background: var(--accent-violet); }
.winner-card.cat-ecom::before { background: var(--accent-orange); }

.winner-icon {
  font-size: 28px;
  margin-bottom: 12px;
  display: block;
}

.winner-category {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cat-overall .winner-category { color: var(--accent-cyan); }
.cat-social .winner-category { color: var(--accent-magenta); }
.cat-free .winner-category { color: var(--accent-lime); }
.cat-text .winner-category { color: var(--accent-gold); }
.cat-art .winner-category { color: var(--accent-violet); }
.cat-ecom .winner-category { color: var(--accent-orange); }

.winner-model {
  font-family: var(--font-display);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.winner-reason {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ═══════════════════════════════════════════════════════════
   PRICING TIERS
   ═══════════════════════════════════════════════════════════ */
.pricing-section {
  padding: 80px 0 120px;
}

.pricing-tiers {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.pricing-tier {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
  transition: transform 0.4s var(--ease-out-expo);
  position: relative;
}
.pricing-tier:hover {
  transform: translateY(-4px);
}
.pricing-tier.tier-highlight {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 40px rgba(0,229,255,0.08);
}
.pricing-tier.tier-highlight::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius-lg);
  padding: 1px;
  background: var(--gradient-accent);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: xor;
  -webkit-mask-composite: xor;
  pointer-events: none;
}

.tier-name {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.tier-price {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent-cyan);
  margin-bottom: 20px;
}
.tier-models {
  list-style: none;
  font-size: 13px;
  color: var(--text-secondary);
}
.tier-models li {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.tier-models li:last-child { border-bottom: none; }

/* ═══════════════════════════════════════════════════════════
   FLOWCHART
   ═══════════════════════════════════════════════════════════ */
.flowchart-section {
  padding: 80px 0 120px;
}

.flowchart {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.flow-node {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px 32px;
  text-align: center;
  max-width: 340px;
  width: 100%;
  position: relative;
}
.flow-node.flow-question {
  border-color: var(--accent-violet);
  background: rgba(157,78,221,0.06);
}
.flow-node.flow-answer {
  border-color: var(--accent-cyan);
  background: rgba(0,229,255,0.04);
}

.flow-question-text {
  font-weight: 600;
  font-size: 14px;
}
.flow-answer-text {
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: 1px;
}
.flow-answer-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.flow-connector {

/* ═══════════════════════════════════════════════════════════
   BUILD CHARTS
   ═══════════════════════════════════════════════════════════ */
function buildBarCharts() {
  // Quality chart
  const qChart = document.getElementById('qualityChart');
  qChart.innerHTML = '';
  const sorted = [...models].filter(m => m.score).sort((a, b) => b.score - a.score);
  sorted.forEach((m, i) => {
    const pct = (m.score / 1300) * 100;
    const colors = ['bar-gradient-1','bar-gradient-2','bar-gradient-3','bar-gradient-4','bar-gradient-5'];
    qChart.innerHTML += `<div class="bar-row"><span class="bar-label">${m.name}</span><div class="bar-track"><div class="bar-fill ${colors[i % 5]}" style="width:${pct}%" data-value="${m.score}"></div></div></div>`;
  });

  // Text quality chart
  const tChart = document.getElementById('textChart');
  tChart.innerHTML = '';
  const textSorted = [...models].sort((a, b) => b.textQ - a.textQ);
  textSorted.forEach((m, i) => {
    const tqClass = m.textQ >= 90 ? 'bar-gradient-1' : m.textQ >= 75 ? 'bar-gradient-2' : m.textQ >= 60 ? 'bar-gradient-5' : 'bar-gradient-3';
    tChart.innerHTML += `<div class="bar-row"><span class="bar-label">${m.name}</span><div class="bar-track"><div class="bar-fill ${tqClass}" style="width:${m.textQ}%" data-value="${m.textQ}%"></div></div></div>`;
  });

  // Speed chart (lower is better, invert for visual)
  const sChart = document.getElementById('speedChart');
  sChart.innerHTML = '';
  const speedSorted = [...models].sort((a, b) => a.speedVal - b.speedVal);
  speedSorted.forEach((m, i) => {
    const pct = Math.max(10, 100 - (m.speedVal / 30) * 80);
    sChart.innerHTML += `<div class="bar-row"><span class="bar-label">${m.name}</span><div class="bar-track"><div class="bar-fill bar-gradient-4" style="width:${pct}%" data-value="${m.speed}"></div></div></div>`;
  });
}

/* ═══════════════════════════════════════════════════════════
   RADAR CHART (Canvas)
   ═══════════════════════════════════════════════════════════ */
function drawRadar() {
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 380 * dpr;
  canvas.height = 380 * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = '380px';
  canvas.style.height = '380px';

  const cx = 190, cy = 190, maxR = 140;
  const labels = currentLang === 'ru'
    ? ['Качество','Скорость','Цена','Текст','Удобство']
    : ['Quality','Speed','Price','Text','Ease of Use'];
  const n = labels.length;
  const angleStep = (Math.PI * 2) / n;
  const startAngle = -Math.PI / 2;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let ring = 1; ring <= 5; ring++) {
    const r = (ring / 5) * maxR;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = startAngle + i * angleStep;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  // Axes
  for (let i = 0; i < n; i++) {
    const a = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * maxR, cy + Math.sin(a) * maxR);
    ctx.stroke();
  }
  // Labels
  ctx.fillStyle = '#8b89a0';
  ctx.font = '11px "JetBrains Mono"';
  ctx.textAlign = 'center';
  for (let i = 0; i < n; i++) {
    const a = startAngle + i * angleStep;
    const lx = cx + Math.cos(a) * (maxR + 22);
    const ly = cy + Math.sin(a) * (maxR + 22);
    ctx.fillText(labels[i], lx, ly + 4);
  }

  // Data for top 5
  const top5 = [
    { name:'GPT Image 1.5', vals:[98,78,60,95,92], color:'rgba(0,229,255,0.7)', fill:'rgba(0,229,255,0.08)' },
    { name:'Gemini 3 Pro', vals:[94,92,85,90,90], color:'rgba(157,78,221,0.7)', fill:'rgba(157,78,221,0.08)' },
    { name:'Midjourney v7', vals:[95,40,50,40,70], color:'rgba(255,45,170,0.7)', fill:'rgba(255,45,170,0.08)' },
    { name:'Flux 2 Max', vals:[90,65,95,75,65], color:'rgba(163,255,18,0.7)', fill:'rgba(163,255,18,0.08)' },
    { name:'Ideogram v2', vals:[82,55,75,90,80], color:'rgba(255,214,0,0.7)', fill:'rgba(255,214,0,0.08)' },
  ];

  top5.forEach(d => {
    ctx.beginPath();
    d.vals.forEach((v, i) => {
      const a = startAngle + i * angleStep;
      const r = (v / 100) * maxR;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = d.fill;
    ctx.fill();
    ctx.strokeStyle = d.color;
    ctx.lineWidth = 2;
    ctx.stroke();
    // Points
    d.vals.forEach((v, i) => {
      const a = startAngle + i * angleStep;
      const r = (v / 100) * maxR;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r, cy + Math.sin(a) * r, 3, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.fill();
    });
  });

  // Legend
  const legendY = 370;
  const legendStartX = 190 - (top5.length * 72) / 2;
  ctx.font = '9px "JetBrains Mono"';
  top5.forEach((d, i) => {
    const lx = legendStartX + i * 76;
    ctx.fillStyle = d.color;
    ctx.fillRect(lx, legendY - 5, 8, 8);
    ctx.fillStyle = '#8b89a0';
    ctx.textAlign = 'left';
    ctx.fillText(d.name.split(' ')[0], lx + 12, legendY + 3);
  });
}

/* ═══════════════════════════════════════════════════════════
   INTERSECTION OBSERVER
   ═══════════════════════════════════════════════════════════ */
function observeReveals() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
}
